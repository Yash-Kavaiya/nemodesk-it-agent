name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        run: pip install pydantic pytest pyyaml
      - name: Validate config YAML parses
        run: python -c "import yaml,glob; [yaml.safe_load(open(f)) for f in glob.glob('configs/*.yml')]; print('configs OK')"
      - name: Run deterministic logic checks
        run: python scripts/ci_checks.py
